name: Integration Tests CPU

on:
  workflow_call:
    inputs:
      matrix:
        required: true
        type: string

permissions:
  contents: read

jobs:
  integration-tests-cpu:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      matrix:
        runner: ${{ fromJson(inputs.matrix) }}
    env:
      RUNNER_TYPE: ${{ matrix.runner[0] }}
      TRITON_BUILD_WITH_CCACHE: "true"
      TRITON_BUILD_WITH_CLANG_LLD: "TRUE"
      TRITON_USE_ASSERT_ENABLED_LLVM: "TRUE"
      TRITON_DISABLE_LINE_INFO: 1
      PROTON_SKIP_PC_SAMPLING_TEST: 1
      PYTHON: "python3"
      CCACHE_COMPRESS: "true"
    steps:
      - name: Install ccache and boost
        run: sudo apt-get update && sudo apt-get install -y ccache libboost-fiber-dev
      - name: Checkout CPU Plugin
        uses: actions/checkout@v6
      - name: Fetch Triton upstream Commit Hash
        shell: bash
        run: |
          TRITON_COMMIT_HASH="$(cat triton.txt)"
          echo "Found Triton commit hash: ${TRITON_COMMIT_HASH}"
          echo "triton_commit_hash=${TRITON_COMMIT_HASH}" >> ${GITHUB_ENV}
      - name: Checkout Triton upstream repo
        uses: actions/checkout@v6
        with:
          repository: triton-lang/triton
          path: triton
          submodules: true
          ref: ${{ env.triton_commit_hash }}
      - name: Apply Triton patches
        working-directory: ./triton
        run: |
          git apply -v ${GITHUB_WORKSPACE}/.github/patches/*.patch
      - name: Compute cache keys
        id: cache-key
        run: |
          triton_file="${GITHUB_WORKSPACE}/triton.txt"

          # Check if files exist before proceeding
          if [[ ! -f "$triton_file" ]]; then
            echo "Error: Required dependency files are missing."
            exit 1
          fi

          # Process the files if they exist
          echo "triton=$(cat $triton_file | cut -c 1-8)" >> $GITHUB_OUTPUT
        shell: bash
      - name: Cache build dependencies
        uses: actions/cache@v5
        with:
          # Note that we cannot use environment variables here given there is
          # no shell to interpret them in the paths.
          path: |
            ~/.triton/llvm
            ~/.triton/nvidia
            ~/.triton/json
          key: ${{ runner.os }}-${{ runner.arch }}-triton-${{ steps.cache-key.outputs.triton }}
      - name: Inspect cache directories
        run: |
          mkdir -p ~/.triton
          du -h -d 1 ~/.triton

          mkdir -p ~/.ccache
          du -h -d 1 ~/.ccache
      - name: Update PATH
        run: |
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Install torch
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch==2.9.0 --index-url https://download.pytorch.org/whl/test/cpu
          python -m pip install knexus
          pip freeze
      - name: Print CPU information
        run: |
          python -m pip install py-cpuinfo
          cpuinfo
      - name: Install Triton
        working-directory: ./triton
        run: |
          nproc
          echo "PATH is '$PATH'"
          ccache --zero-stats
          MAX_JOBS=8 TRITON_PLUGIN_DIRS=${GITHUB_WORKSPACE} make dev-install
      - name: CCache Stats
        run: ccache --print-stats

      - name: Run local tests
        working-directory: ./triton
        run: python -m pytest ../python/test --ignore=../python/test/nexus

      - name: Run CPU-specific tutorial clones
        working-directory: ./triton
        env:
          TRITON_DEFAULT_BACKEND: "cpu"
        run: |
            TRITON_CPU_ENABLE_TILE_AND_FUSE=1 python ../python/tutorials/02-fused-softmax.py
            python ../python/tutorials/03-matrix-multiplication.py

      # Triton tests.
      - name: Run lit tests
        working-directory: ./triton
        run: |
          make test-lit
          export BUILD_DIR="$(cd python; python -c 'from build_helpers import get_cmake_dir; print(get_cmake_dir())')"
          ninja -C ${BUILD_DIR} check-triton-cpu-lit-tests
      - name: Run python tests on CPU
        working-directory: ./triton
        run: |
          TRITON_CPU_ENABLE_TILE_AND_FUSE=1 python -m pytest --device "cpu" python/test/unit/language/test_core.py -k "(test_reduce1d or test_generic_reduction or test_load_store_same_ptr)"
          TRITON_CPU_ENABLE_TILE_AND_FUSE=1 python -m pytest --device "cpu" python/test/unit/language/test_core.py -k "(test_unary_op or test_math_op or test_abs[ or test_store_constant or test_split or test_convert_float16_to_float32 or test_optimize_thread_locality or test_full or test_const[ or test_masked_load[ or test_masked_load_scalar[ or test_vectorization[ or test_assume or test_value_specialization or test_bin_op_constexpr or test_call or test_if[ or test_map_elementwise or test_for_iv or test_if_else or test_while or test_nested_while or test_propagate_nan[m or test_static_range or test_unsplat)"
          TRITON_CPU_ENABLE_TILE_AND_FUSE=1 python -m pytest --device "cpu" python/test/unit/language/test_core.py -k "test_interleave and not test_interleave_scalars"
          TRITON_CPU_WARP_SIZE=4 python -m pytest --device "cpu" python/test/unit/language/test_core.py -k "(test_reduce1d or test_load_store_same_ptr) and not test_reduce1d[1-sum-float16-512]"

          TRITON_CPU_WARP_SIZE=4 python -m pytest --device "cpu" python/test/unit/language/test_core.py -k "test_dot["

          python -m pytest --device "cpu" python/test/unit/runtime/test_launch.py -k "not test_launch_with_options"
      - name: Run tutorial 01 on CPU
        working-directory: ./triton
        run: python python/tutorials/01-vector-add.py
      - name: Run gluon tests
        working-directory: ./triton
        run: |
          TRITON_CPU_WARP_SIZE=4 python -m pytest --device "cpu" python/test/gluon/test_core.py -k "test_copy_kernel"
      - name: Run interpreter tests
        working-directory: ./triton
        if: false
        run: make test-interpret
      - name: Run regression tests
        working-directory: ./triton
        if: false
        run: make test-regression
      - name: Run C++ unittests
        working-directory: ./triton
        run: make test-cpp

      # Nexus-backed CPU path (separate process from local tests above)
      - name: Run Nexus tests
        working-directory: ./triton
        env:
          NEXUS_LOG_ENABLE: "1"
        run: python -m pytest ../python/test/nexus

      - name: Inspect cache directories
        run: |
          mkdir -p ~/.triton
          du -h -d 1 ~/.triton

          mkdir -p ~/.ccache
          du -h -d 1 ~/.ccache

      - name: Upload kernel artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kernels
          path: ~/.triton/cache
          retention-days: 14
